<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0c1222;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.glow{position:absolute;border-radius:50%;filter:blur(120px);opacity:.4}
.g1{width:400px;height:400px;background:#6C5CE7;top:-10%;right:5%}
.g2{width:300px;height:300px;background:#EC4899;bottom:-5%;left:15%}
.content{position:relative;z-index:1;text-align:center;padding:0 80px}
.logo{font-size:28px;font-weight:800;color:#fff;margin-bottom:32px;letter-spacing:-0.03em}
.logo span{background:linear-gradient(135deg,#6C5CE7,#A855F7,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h1{font-size:56px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-0.035em;margin-bottom:20px}
h1 em{font-style:normal;background:linear-gradient(135deg,#6C5CE7,#A855F7,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{font-size:20px;color:rgba(255,255,255,0.55);font-weight:500;margin-bottom:28px}
.url{font-size:15px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="content">
<div class="logo">Fan<span>Flow</span></div>
<h1>Hacemos que tu marca <em>explote en redes.</em></h1>
<p>Estrategia viral · Contenido que convierte · Comunidades que crecen</p>
<div class="url">FANFLOW.ES</div>
</div>
</body>
</html>
